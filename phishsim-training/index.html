<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>Phishing Awareness Training · EdgeIQ Labs</title>
  <meta name="description" content="Learn to recognize and avoid phishing attacks with EdgeIQ Labs security awareness training." />
  <meta name="robots" content="noindex, nofollow" />
  <style>
    :root {
      --bg: #0b0f14;
      --card: #121923;
      --card2: #0f1620;
      --text: #e8eef7;
      --muted: #9fb0c7;
      --accent: #3dd9ff;
      --border: #233142;
      --ok: #70f0a8;
      --warn: #ffb347;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: rgba(11,15,20,0.95);
      backdrop-filter: blur(6px);
      z-index: 10;
    }
    .container { max-width: 860px; margin: 0 auto; padding: 0 20px; }
    .nav-inner { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-img { height: 38px; width: auto; border-radius: 8px; }
    .nav-wordmark { display: flex; flex-direction: column; line-height: 1.1; }
    .nav-brand-name { font-weight: 800; font-size: 1rem; letter-spacing: -0.02em; color: var(--text); }
    .nav-brand-name span { color: var(--accent); }
    .nav-brand-tag { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; margin-top: 2px; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-right a { color: var(--muted); text-decoration: none; font-size: 0.82rem; padding: 5px 8px; border-radius: 6px; }
    .nav-right a:hover { color: var(--text); background: rgba(255,255,255,0.05); }

    /* ── Page shell ── */
    .training-wrap { max-width: 860px; margin: 0 auto; padding: 32px 20px 60px; }

    /* ── Caught banner ── */
    .caught-banner {
      background: linear-gradient(135deg, #1a0a0a 0%, #1f0f0f 100%);
      border: 1px solid rgba(255,107,107,0.35);
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 28px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    .caught-icon { font-size: 2.4rem; line-height: 1; flex-shrink: 0; margin-top: 2px; }
    .caught-text h1 { font-size: 1.5rem; font-weight: 800; color: #ff9090; margin-bottom: 6px; }
    .caught-text p { color: #c8a8a8; font-size: 0.95rem; line-height: 1.55; }
    @media (max-width: 540px) {
      .caught-banner { flex-direction: column; gap: 12px; padding: 20px; }
      .caught-text h1 { font-size: 1.25rem; }
    }

    /* ── Progress indicator ── */
    .progress-bar-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .progress-label { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
    .progress-track { flex: 1; height: 6px; background: rgba(35,49,66,0.8); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }
    .progress-pct { font-size: 0.8rem; color: var(--accent); font-weight: 700; white-space: nowrap; }

    /* ── Section cards ── */
    .section-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 28px;
      margin-bottom: 18px;
    }
    .section-card h2 {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .section-card p { font-size: 0.95rem; color: #c8d8ea; line-height: 1.65; }
    .section-card p + p { margin-top: 10px; }
    @media (max-width: 540px) {
      .section-card { padding: 18px 16px; }
    }

    /* ── Red flags list ── */
    .red-flags-list { list-style: none; margin-top: 4px; }
    .red-flags-list li {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(35,49,66,0.6);
      font-size: 0.92rem;
      color: #c8d8ea;
      line-height: 1.5;
    }
    .red-flags-list li:last-child { border-bottom: none; padding-bottom: 0; }
    .red-flags-list .flag-dot {
      flex-shrink: 0;
      width: 20px; height: 20px;
      background: rgba(255,107,107,0.15);
      border: 1px solid rgba(255,107,107,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px;
    }
    .red-flags-list .flag-dot::after {
      content: '!';
      font-size: 0.68rem;
      font-weight: 800;
      color: var(--danger);
    }

    /* ── Tips list ── */
    .tips-list { list-style: none; margin-top: 4px; }
    .tips-list li {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(35,49,66,0.6);
      font-size: 0.92rem;
      color: #c8d8ea;
      line-height: 1.5;
    }
    .tips-list li:last-child { border-bottom: none; padding-bottom: 0; }
    .tip-num {
      flex-shrink: 0;
      width: 22px; height: 22px;
      background: rgba(61,217,255,0.1);
      border: 1px solid rgba(61,217,255,0.2);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.68rem;
      font-weight: 800;
      color: var(--accent);
      margin-top: 2px;
    }

    /* ── Fundamentals box ── */
    .fundamentals-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }
    @media (max-width: 540px) { .fundamentals-grid { grid-template-columns: 1fr; } }
    .fund-item {
      background: #0d1620;
      border: 1px solid rgba(35,49,66,0.8);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .fund-item .fund-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .fund-item p {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── Quiz ── */
    .quiz-section { margin-top: 0; }
    .quiz-q {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .quiz-q:last-of-type { border-bottom: none; padding-bottom: 0; }
    .quiz-q-text {
      font-size: 0.97rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .quiz-q-num {
      display: inline-block;
      background: rgba(61,217,255,0.12);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      margin-bottom: 6px;
    }
    .quiz-choices { display: flex; flex-direction: column; gap: 8px; }
    .quiz-choice {
      background: #0d1620;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 11px 14px;
      font-size: 0.88rem;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      text-align: left;
      width: 100%;
      position: relative;
    }
    .quiz-choice:hover:not(:disabled) {
      border-color: rgba(61,217,255,0.4);
      color: var(--text);
    }
    .quiz-choice.correct {
      background: rgba(112,240,168,0.1);
      border-color: rgba(112,240,168,0.4);
      color: var(--ok);
    }
    .quiz-choice.wrong {
      background: rgba(255,107,107,0.08);
      border-color: rgba(255,107,107,0.3);
      color: var(--danger);
    }
    .quiz-choice.revealed-correct {
      background: rgba(112,240,168,0.07);
      border-color: rgba(112,240,168,0.25);
      color: var(--ok);
    }
    .quiz-choice:disabled { cursor: default; }
    .quiz-feedback {
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.5;
      display: none;
    }
    .quiz-feedback.show { display: block; }
    .quiz-feedback.ok-fb {
      background: rgba(112,240,168,0.1);
      border: 1px solid rgba(112,240,168,0.25);
      color: var(--ok);
    }
    .quiz-feedback.bad-fb {
      background: rgba(255,107,107,0.08);
      border: 1px solid rgba(255,107,107,0.2);
      color: #ff9090;
    }

    /* ── Quiz score summary ── */
    .quiz-score-wrap {
      display: none;
      margin-top: 18px;
      background: #0d1620;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      text-align: center;
    }
    .quiz-score-wrap.show { display: block; }
    .quiz-score-num { font-size: 2rem; font-weight: 800; color: var(--accent); }
    .quiz-score-label { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }

    /* ── Complete button ── */
    .complete-wrap { margin-top: 28px; text-align: center; }
    .btn-complete {
      background: var(--ok);
      color: #071018;
      font-weight: 800;
      font-size: 1rem;
      padding: 14px 36px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: -0.01em;
    }
    .btn-complete:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn-complete:disabled {
      background: rgba(112,240,168,0.25);
      color: rgba(7,16,24,0.5);
      cursor: default;
      transform: none;
    }
    .btn-complete.done {
      background: var(--ok);
      color: #071018;
      cursor: default;
      transform: none;
    }
    .complete-note { font-size: 0.8rem; color: var(--muted); margin-top: 8px; }

    /* ── Unknown scenario ── */
    .unknown-wrap { text-align: center; padding: 60px 20px; }
    .unknown-wrap h2 { font-size: 1.4rem; margin-bottom: 12px; }
    .unknown-wrap p { color: var(--muted); margin-bottom: 20px; }
    .btn-home {
      display: inline-block;
      background: var(--accent);
      color: #071018;
      font-weight: 700;
      padding: 10px 22px;
      border-radius: 9px;
      text-decoration: none;
      font-size: 0.9rem;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 24px 0 36px;
      color: var(--muted);
      font-size: 0.82rem;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>

// ─────────────────────────────────────────────────────────────────────────────
// Universal phishing fundamentals
// ─────────────────────────────────────────────────────────────────────────────
const FUNDAMENTALS = [
  {
    title: 'Verify the sender domain',
    body: 'The display name can say anything. The actual email domain is what matters. Hover or tap the sender name to reveal it.'
  },
  {
    title: 'Check the URL before you type',
    body: 'Hover over links before clicking. Look at your browser\'s address bar after landing. One wrong character makes it fake.'
  },
  {
    title: 'Never click — navigate directly',
    body: 'For any sensitive action (banking, email, HR), open a new tab and type the URL yourself, or use a saved bookmark.'
  },
  {
    title: 'HTTPS ≠ safe',
    body: 'The padlock means the connection is encrypted. It does not mean the site is legitimate. Phishing sites have HTTPS too.'
  },
  {
    title: 'Urgency is a weapon',
    body: '"Act now or lose access" is designed to short-circuit your critical thinking. Slow down — real systems give you time.'
  },
  {
    title: 'MFA stops most attacks',
    body: 'Multi-factor authentication means stolen passwords aren\'t enough. Enable it everywhere you can, especially on work systems.'
  }
];

// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
const params   = new URLSearchParams(window.location.search);
const scenario = (params.get('scenario') || '').toLowerCase().trim();
const data     = SCENARIOS[scenario];

// quiz state
const quizState = {}; // { qIndex: { answered, correct } }
let sectionsViewed = 0;
const TOTAL_SECTIONS = 5; // caught, attack, redflags, tips, quiz

// ─────────────────────────────────────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────────────────────────────────────
function render() {
  const wrap = document.getElementById('training-wrap');

  if (!data) {
    wrap.innerHTML = `
      <div class="unknown-wrap">
        <h2>Training module not found</h2>
        <p>The scenario "<strong>${escHtml(scenario || 'unknown')}</strong>" doesn't match any training module.</p>
        <a class="btn-home" href="/phishsim/">Go to PhishSim Dashboard</a>
      </div>`;
    return;
  }

  const isComplete = localStorage.getItem('phishsim_complete_' + scenario) === '1';

  wrap.innerHTML = `
    ${renderCaughtBanner()}
    ${renderProgress(isComplete)}
    ${renderAttackSection()}
    ${renderRedFlags()}
    ${renderTips()}
    ${renderFundamentals()}
    ${renderQuiz()}
    ${renderCompleteButton(isComplete)}
  `;

  // Wire quiz
  document.querySelectorAll('.quiz-choice').forEach(btn => {
    btn.addEventListener('click', handleQuizChoice);
  });

  // Update progress on scroll
  setupProgressTracking();

  // If already complete, disable the button
  if (isComplete) {
    const btn = document.getElementById('btn-complete');
    if (btn) {
      btn.textContent = '✓ Training Complete';
      btn.classList.add('done');
      btn.disabled = true;
    }
  }
}

function renderCaughtBanner() {
  return `
    <div class="caught-banner">
      <div class="caught-icon">${data.icon}</div>
      <div class="caught-text">
        <h1>You were caught by a phishing simulation.</h1>
        <p>This was a controlled test run by your organization. No real harm was done — but this is exactly how real attackers operate. This training will show you what the attack looked like, why it works, and how to spot it next time.</p>
      </div>
    </div>`;
}

function renderProgress(isComplete) {
  const pct = isComplete ? 100 : 0;
  return `
    <div class="progress-bar-wrap" id="progress-wrap">
      <span class="progress-label">Module progress</span>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-pct" id="progress-pct">${pct}%</span>
    </div>`;
}

function renderAttackSection() {
  return `
    <div class="section-card" data-section="attack">
      <h2>What this attack is</h2>
      <p><strong>${data.attackType}.</strong></p>
      <p>${data.howUsed}</p>
      ${data.howUsed2 ? `<p>${data.howUsed2}</p>` : ''}
    </div>`;
}

function renderRedFlags() {
  const items = data.redFlags.map(flag => `
    <li>
      <span class="flag-dot"></span>
      <span>${flag}</span>
    </li>`).join('');
  return `
    <div class="section-card" data-section="redflags">
      <h2>Red flags in this simulation</h2>
      <p style="margin-bottom:12px;font-size:0.88rem;color:var(--muted);">Here are the specific signals that should have indicated this was a phishing attempt:</p>
      <ul class="red-flags-list">${items}</ul>
    </div>`;
}

function renderTips() {
  const items = data.tips.map((tip, i) => `
    <li>
      <span class="tip-num">${i + 1}</span>
      <span>${tip}</span>
    </li>`).join('');
  return `
    <div class="section-card" data-section="tips">
      <h2>How to protect yourself</h2>
      <ul class="tips-list">${items}</ul>
    </div>`;
}

function renderFundamentals() {
  const items = FUNDAMENTALS.map(f => `
    <div class="fund-item">
      <div class="fund-title">${f.title}</div>
      <p>${f.body}</p>
    </div>`).join('');
  return `
    <div class="section-card" data-section="fundamentals">
      <h2>Universal phishing fundamentals</h2>
      <p style="margin-bottom:14px;font-size:0.88rem;color:var(--muted);">These principles apply to every phishing attack, not just this scenario.</p>
      <div class="fundamentals-grid">${items}</div>
    </div>`;
}

function renderQuiz() {
  const qs = data.quiz.map((q, qi) => `
    <div class="quiz-q" id="quiz-q-${qi}">
      <span class="quiz-q-num">Question ${qi + 1} of ${data.quiz.length}</span>
      <div class="quiz-q-text">${q.q}</div>
      <div class="quiz-choices">
        ${q.choices.map((c, ci) => `
          <button class="quiz-choice" data-qi="${qi}" data-ci="${ci}" type="button">${c}</button>
        `).join('')}
      </div>
      <div class="quiz-feedback" id="quiz-fb-${qi}"></div>
    </div>`).join('');

  return `
    <div class="section-card quiz-section" data-section="quiz">
      <h2>Quick check — test your understanding</h2>
      <p style="margin-bottom:20px;font-size:0.88rem;color:var(--muted);">Select the best answer for each question.</p>
      ${qs}
      <div class="quiz-score-wrap" id="quiz-score"></div>
    </div>`;
}

function renderCompleteButton(isComplete) {
  return `
    <div class="complete-wrap">
      <button class="btn-complete ${isComplete ? 'done' : ''}" id="btn-complete" ${isComplete ? 'disabled' : ''} onclick="markComplete()">
        ${isComplete ? '✓ Training Complete' : 'Mark as Complete'}
      </button>
      <div class="complete-note" id="complete-note">
        ${isComplete ? 'Recorded on ' + (localStorage.getItem('phishsim_complete_' + scenario + '_date') || 'this device') : 'Click after reading all sections and completing the quiz.'}
      </div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Quiz logic
// ─────────────────────────────────────────────────────────────────────────────
function handleQuizChoice(e) {
  const btn = e.currentTarget;
  const qi = parseInt(btn.dataset.qi);
  const ci = parseInt(btn.dataset.ci);

  if (quizState[qi]) return; // already answered

  const q = data.quiz[qi];
  const correct = q.correct;
  const isCorrect = ci === correct;

  quizState[qi] = { answered: true, correct: isCorrect };

  // Disable all choices for this question
  const allChoices = document.querySelectorAll(`.quiz-choice[data-qi="${qi}"]`);
  allChoices.forEach(b => {
    b.disabled = true;
    if (parseInt(b.dataset.ci) === correct) b.classList.add('revealed-correct');
  });

  // Style the clicked button
  btn.classList.remove('revealed-correct');
  btn.classList.add(isCorrect ? 'correct' : 'wrong');

  // Show feedback
  const fb = document.getElementById('quiz-fb-' + qi);
  fb.className = 'quiz-feedback show ' + (isCorrect ? 'ok-fb' : 'bad-fb');
  fb.innerHTML = (isCorrect ? '<strong>Correct.</strong> ' : '<strong>Not quite.</strong> ') + q.explanation;

  updateProgress();
  checkQuizComplete();
}

function checkQuizComplete() {
  const answered = Object.keys(quizState).length;
  if (answered < data.quiz.length) return;

  const correct = Object.values(quizState).filter(s => s.correct).length;
  const pct = Math.round((correct / data.quiz.length) * 100);

  const scoreWrap = document.getElementById('quiz-score');
  scoreWrap.className = 'quiz-score-wrap show';
  scoreWrap.innerHTML = `
    <div class="quiz-score-num">${correct}/${data.quiz.length}</div>
    <div class="quiz-score-label">${pct}% — ${scoreMsg(pct)}</div>
  `;

  updateProgress();
}

function scoreMsg(pct) {
  if (pct === 100) return 'Perfect score. Well done.';
  if (pct >= 67)  return 'Good understanding. Review any questions you missed.';
  return 'Take another look at the sections above and retake the quiz.';
}

// ─────────────────────────────────────────────────────────────────────────────
// Progress tracking
// ─────────────────────────────────────────────────────────────────────────────
const visibleSections = new Set();

function setupProgressTracking() {
  const sections = document.querySelectorAll('[data-section]');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        visibleSections.add(entry.target.dataset.section);
        updateProgress();
      }
    });
  }, { threshold: 0.25 });
  sections.forEach(s => observer.observe(s));
}

function updateProgress() {
  const sectionCount = visibleSections.size;
  const quizAnswered = Object.keys(quizState).length;
  const quizTotal = data ? data.quiz.length : 3;
  const isComplete = localStorage.getItem('phishsim_complete_' + scenario) === '1';

  if (isComplete) {
    setProgress(100);
    return;
  }

  // 70% from scrolling through sections, 30% from answering quiz
  const sectionPct = Math.min((sectionCount / 5) * 70, 70);
  const quizPct = (quizAnswered / quizTotal) * 30;
  const total = Math.round(sectionPct + quizPct);
  setProgress(Math.min(total, 95)); // cap at 95 until marked complete
}

function setProgress(pct) {
  const fill = document.getElementById('progress-fill');
  const label = document.getElementById('progress-pct');
  if (fill) fill.style.width = pct + '%';
  if (label) label.textContent = pct + '%';
}

// ─────────────────────────────────────────────────────────────────────────────
// Mark complete
// ─────────────────────────────────────────────────────────────────────────────
function markComplete() {
  const date = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  localStorage.setItem('phishsim_complete_' + scenario, '1');
  localStorage.setItem('phishsim_complete_' + scenario + '_date', date);

  setProgress(100);

  const btn = document.getElementById('btn-complete');
  const note = document.getElementById('complete-note');
  if (btn) {
    btn.textContent = '✓ Training Complete';
    btn.classList.add('done');
    btn.disabled = true;
  }
  if (note) note.textContent = 'Recorded on ' + date;
}

// ─────────────────────────────────────────────────────────────────────────────
// Utils
// ─────────────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────────────────
render();
</script>
